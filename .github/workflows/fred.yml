name: FRED daily fetch

on:
  schedule:
    - cron: '0 20 * * *'   # 매일 20:00 UTC (한국시간 익일 05:00). 원하는 시간으로 조정 가능
  workflow_dispatch: {}     # 수동 실행 버튼

permissions:
  contents: write           # fred.json 커밋/푸시 권한

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install fredapi yfinance
      - name: Fetch FRED data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fred_fetch.py
      - name: Fetch US stock prices
        run: python stocks_fetch.py
      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fred.json stocks.json
          git commit -m "update data ($(date -u +%F))" || echo "no changes"
          git push
